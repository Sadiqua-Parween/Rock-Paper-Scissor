<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <div class="game">
      <h1>🪨 Rock – 📄 Paper – ✂️ Scissors</h1>

      <!-- Scoreboard -->
      <div class="scoreboard">
        <div class="score">
          <p>You</p>
          <span id="player-score">0</span>
        </div>
        <div class="score">
          <p>Computer</p>
          <span id="computer-score">0</span>
        </div>
      </div>

      <!-- Choices -->
      <div class="choices">
        <button class="choice" data-choice="rock">🪨 Rock</button>
        <button class="choice" data-choice="paper">📄 Paper</button>
        <button class="choice" data-choice="scissors">✂️ Scissors</button>
      </div>

      <!-- Result -->
      <div class="result">
        <p id="result-text">Make your move!</p>
        <p class="moves">
          You: <span id="player-move">-</span> | Computer:
          <span id="computer-move">-</span>
        </p>
      </div>

      <!-- Reset -->
      <button class="reset">Reset Game</button>
    </div>

    <script src="sandbox.js"></script>
  </body>
</html>
